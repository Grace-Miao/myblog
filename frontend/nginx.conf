server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: 所有路径都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 把 /api 请求转发到后端
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
